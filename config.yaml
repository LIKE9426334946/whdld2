seed: 42
num_classes: 6
class_names: [vegetation, water, road, building, pavement, bare_soil]

data:
  root: /kaggle/input/datasets/thenoart/whdld-data
  images_dir: image/Images
  masks_dir: imagesPNG/ImagesPNG
  image_size: [256, 256]
  num_workers: 2
  split_dir: runs/splits

model:
  name: deeplabv3plus
  in_channels: 3
  base_c: 64

train:
  batch_size: 16
  epochs: 60
  lr: 0.0003
  weight_decay: 0.0001
  amp: true
  save_top_k: 3
  vis_samples: 4

optimizer:
  name: adamw

scheduler:
  name: cosine
  min_lr: 1.0e-6

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 0.5

runs:
  root: runs
